name: Build releases

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "manifest.json"
      - "**.cs"
      - "**.csproj"
      - "**.slnx"
      - "Mods/**"
  pull_request:
    paths:
      - "**.cs"
      - "**.csproj"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: write

    env:
      RELEASE_REF: refs/heads/stable

    steps:
      - name: Fetch code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Add build environment
        uses: Pathoschild/SMAPI-ModBuildWorkflow/add-build-environment@v0

      - name: Set prerelease versions
        uses: Pathoschild/SMAPI-ModBuildWorkflow/set-prerelease-versions@v0
        if: github.ref != env.RELEASE_REF

      - name: Build mods
        run: dotnet build --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release
        continue-on-error: true

      - name: Create combined Mods package
        run: |
          mkdir -p _combined_temp
          mkdir -p _releases

          echo "📂 Creating combined Mods package..."
          echo ""

          for zipfile in ./Mods/**/*.zip; do
            if [ -f "$zipfile" ]; then
              modname=$(basename "$zipfile" .zip | sed 's/ [0-9].*$//')
              echo "Processing: $modname"

              temp_dir=$(mktemp -d)
              unzip -q "$zipfile" -d "$temp_dir"

              items=$(ls -A "$temp_dir")
              item_count=$(echo "$items" | wc -w)

              mkdir -p "_combined_temp/$modname"

              if [ $item_count -eq 1 ] && [ -d "$temp_dir/$items" ]; then
                echo "  → Flatten nested structure"
                cp -r "$temp_dir/$items"/* "_combined_temp/$modname/"
              else
                echo "  → Using flat structure"
                cp -r "$temp_dir"/* "_combined_temp/$modname/"
              fi

              rm -rf "$temp_dir"
              echo ""
            fi
          done

          echo "📦 Final structure:"
          for moddir in _combined_temp/*/; do
            modname=$(basename "$moddir")
            filecount=$(find "$moddir" -type f | wc -l)
            echo "  $modname/ ($filecount files)"
          done

          echo ""
          echo "🗜️ Creating Mods.zip..."
          cd _combined_temp
          zip -r ../_releases/Mods.zip . -q
          cd ..

          echo ""
          echo "✅ Final package:"
          ls -lh _releases/

          echo ""
          echo "📋 Mods.zip structure preview:"
          unzip -l _releases/Mods.zip | head -50
        shell: bash

      - name: Upload release artifacts
        uses: Pathoschild/SMAPI-ModBuildWorkflow/upload-release-artifacts@v0
        with:
          create_attestations: ${{ github.ref == env.RELEASE_REF }}
