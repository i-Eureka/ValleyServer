name: Build & Release Mods

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "manifest.json"
      - "**.cs"
      - "**.csproj"
      - "**.slnx"
      - "Mods/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fetch code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Add build environment
        uses: Pathoschild/SMAPI-ModBuildWorkflow/add-build-environment@v0

      - name: Build mods
        run: dotnet build --configuration Release

      - name: Create combined Mods package
        shell: bash
        run: |
          set -e

          mkdir -p _combined_temp
          mkdir -p _releases

          echo "📂 Creating combined Mods package..."

          zip_count=$(find ./Mods -type f -name "*.zip" | wc -l)

          if [ "$zip_count" -eq 0 ]; then
            echo "❌ No mod zip files found in ./Mods"
            exit 1
          fi

          find ./Mods -type f -name "*.zip" | while read zipfile; do
            modname=$(basename "$zipfile" .zip | sed 's/ [0-9].*$//')
            echo "Processing: $modname"

            temp_dir=$(mktemp -d)
            unzip -q "$zipfile" -d "$temp_dir"

            items=$(ls -A "$temp_dir")
            item_count=$(echo "$items" | wc -w)

            mkdir -p "_combined_temp/$modname"

            if [ "$item_count" -eq 1 ] && [ -d "$temp_dir/$items" ]; then
              cp -r "$temp_dir/$items"/* "_combined_temp/$modname/"
            else
              cp -r "$temp_dir"/* "_combined_temp/$modname/"
            fi

            rm -rf "$temp_dir"
          done

          echo "🗜️ Creating Mods.zip..."
          cd _combined_temp
          zip -r ../_releases/Mods.zip . -q
          cd ..

          echo "✅ Done:"
          ls -lh _releases/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: _releases/Mods.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
